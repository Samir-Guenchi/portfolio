<!-- Critical CSS inlined for fastest FCP + CLS Prevention -->
<style>
  /* Critical above-the-fold styles */
  :root {
    --ink: #0d1b2a;
    --paper: #f8f6f3;
    --accent: #c2410c;
    --pencil: #4a5568;
    --highlight: #b45309;
    --success: #047857;
    --link: #1e40af;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { 
    scroll-behavior: smooth;
    overflow-x: hidden;
    width: 100%;
  }
  body { 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
    overflow-x: hidden;
    width: 100%;
    max-width: 100vw;
  }
  
  /* H1 FONT SIZE FIX */
  h1, section h1, article h1, aside h1, nav h1, header h1, footer h1, main h1 {
    font-size: clamp(28px, 5vw, 48px);
    line-height: 1.15;
    font-family: 'Caveat', cursive;
    font-weight: 700;
  }
  
  /* MOBILE CLS FIX: Reserve space for header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(248, 246, 243, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--ink);
    min-height: 64px;
    contain: layout style;
  }
  .hdr {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 32px;
  }
  .logo {
    font: 700 24px / 1 'Caveat', cursive;
    color: var(--ink);
    text-decoration: none;
  }
  
  #main {
    min-height: 100vh;
    min-height: 100dvh;
    contain: layout style;
  }
  
  /* Loading spinner */
  #loading.hide { display: none; }
  .loading {
    position: fixed;
    inset: 0;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--pencil);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

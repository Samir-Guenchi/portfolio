  <!-- Service Worker Unregister Script -->
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      if (regs.length > 0) {
        regs.forEach(r => r.unregister());
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => location.reload());
      }
    });
  }
  </script>

  <!-- ========================================

  <style>
    :root {
      --ink: #0d1b2a;
      --paper: #f8f6f3;
      --accent: #c2410c;
      --pencil: #4a5568;
      --highlight: #b45309;
      --success: #047857;
      --link: #1e40af;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; width: 100%; }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
    }
    h1, section h1 { font-size: clamp(28px, 5vw, 48px); line-height: 1.15; font-family: 'Caveat', cursive; font-weight: 700; }
    header { position: sticky; top: 0; z-index: 100; background: rgba(248, 246, 243, 0.95); backdrop-filter: blur(12px); border-bottom: 2px solid var(--ink); min-height: 64px; contain: layout style; }
    #main { min-height: 100vh; min-height: 100dvh; contain: layout style; }
    .loading { position: fixed; inset: 0; background: var(--paper); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--pencil); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading.hide { display: none; }
  </style>

<body>
  <!-- Loading Spinner -->

  <!-- Header (loaded dynamically) -->
  <div id="header-container"></div>

  <!-- Main Content -->

    <div id="highlights-container"></div>
    <div id="glossary-container"></div>
    <div id="experience-container"></div>
    <div id="certificates-container"></div>
    <div id="contact-container"></div>
  </main>

  <!-- Footer (loaded dynamically) -->
  <div id="footer-container"></div>

  <!-- Initialize Components -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const components = [
        { selector: '#header-container', path: 'components/header-new.html' },
        { selector: '#hero-container', path: 'components/hero-new.html' },
        { selector: '#highlights-container', path: 'components/highlights.html' },
        { selector: '#glossary-container', path: 'components/glossary.html' },
        { selector: '#experience-container', path: 'components/experience.html' },
        { selector: '#certificates-container', path: 'components/certificates.html' },
        { selector: '#contact-container', path: 'components/contact.html' },
        { selector: '#footer-container', path: 'components/footer.html' }
      ];

      try {
        await componentLoader.loadComponents(components);
        document.getElementById('loading')?.classList.add('hide');
        if (typeof initializeApp === 'function') initializeApp();
      } catch (error) {
        console.error('Failed to load components:', error);
        document.getElementById('loading')?.classList.add('hide');
      }
    });
  </script>
  
  <script src="js/script.js"></script>
</body>
